mutation SendInAppChatMessage(
  $conversationId: UUID!
  $identityId: UUID!
  $content: JSON!
  $clientMessageId: String!
) {
  sendInAppChatMessage(
    input: {
      conversationId: $conversationId
      identityId: $identityId
      content: $content
      clientMessageId: $clientMessageId
    }
  ) {
    id
    conversationId
    renderedContent
    externalUid
    senderId
    aiRole
    sentAt
    createdAt
  }
}
